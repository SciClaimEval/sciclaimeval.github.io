        let currentPair = null;
        
        // Group examples into pairs based on claim_id_old
        function groupIntoPairs() {
            const pairs = {};
            
            examples.forEach(example => {
                const claimIdOld = example.claim_id_old;
                const baseId = claimIdOld.replace('_2', '');
                
                if (!pairs[baseId]) {
                    pairs[baseId] = [];
                }
                pairs[baseId].push(example);
            });
            
            // Filter to only complete pairs (with both supported and refuted)
            const completePairs = [];
            for (const [baseId, items] of Object.entries(pairs)) {
                if (items.length === 2) {
                    completePairs.push(items);
                }
            }
            
            return completePairs;
        }
        
        const allPairs = groupIntoPairs();
        
        function getRandomPair() {
            const randomIndex = Math.floor(Math.random() * allPairs.length);
            return allPairs[randomIndex];
        }
        
        function displayPair(pair) {
            // Identify which is supported and which is refuted
            const supported = pair.find(item => item.label === 'Supported');
            const refuted = pair.find(item => item.label === 'Refuted');
            
            if (!supported || !refuted) {
                console.error('Invalid pair: missing supported or refuted claim');
                return;
            }
            
            // Use the claim from one of them (they should be the same)
            const claim = supported.claim;
            const caption = supported.caption;
            const operation = supported.operation || 'N/A';
            const context = supported.context || 'No context available';
            
            const html = `
                <div class="info-section">
                    <div class="info-row">
                        <span class="info-label">Claim:</span>
                        <div class="claim">${claim}</div>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Caption:</span>
                        <div class="caption">${caption}</div>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Operation:</span>
                        <span class="info-value">${operation}</span>
                    </div>
                    
                    <div class="buttons">
                        <button onclick="showAnotherExample()">Show Another Example</button>
                    </div>
                </div>
                
                <div class="images-container">
                    <div class="image-box supported">
                        <h3>✓ Supported Evidence</h3>
                        <img src="${supported.evi_path}" alt="Supported Evidence">
                    </div>
                    
                    <div class="image-box refuted">
                        <h3>✗ Refuted Evidence</h3>
                        <img src="${refuted.evi_path}" alt="Refuted Evidence">
                    </div>
                </div>
                
                <div class="context-section">
                    <button id="showContextBtn" onclick="toggleContext()" style="margin: 0;">Show Context</button>
                    <div id="contextContent" class="context-content">
                        <strong>Context:</strong> ${context}
                    </div>
                </div>
            `;
            
            document.getElementById('exampleContainer').innerHTML = html;
        }
        
        function toggleContext() {
            const contextContent = document.getElementById('contextContent');
            const btn = document.getElementById('showContextBtn');
            
            if (contextContent.classList.contains('show')) {
                contextContent.classList.remove('show');
                btn.textContent = 'Show Context';
            } else {
                contextContent.classList.add('show');
                btn.textContent = 'Hide Context';
            }
        }
        
        function showAnotherExample() {
            currentPair = getRandomPair();
            displayPair(currentPair);
        }
        
        // Initialize with a random example
        showAnotherExample();
    </script>
</body>
</html>
